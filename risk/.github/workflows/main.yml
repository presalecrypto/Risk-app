name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── Typecheck & Lint ───────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        id: typecheck
        run: npx tsc --noEmit 2>&1 | tee tsc-report.txt
        continue-on-error: true

      - name: Lint
        id: lint
        run: npm run lint 2>&1 | tee lint-report.txt
        continue-on-error: true

      - name: Build web app
        id: build-web
        run: npm run build 2>&1 | tee build-report.txt
        continue-on-error: true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-reports
          path: |
            tsc-report.txt
            lint-report.txt
            build-report.txt
          retention-days: 7

      - name: Fail on TypeScript errors
        if: always() && steps.typecheck.outcome == 'failure'
        run: |
          echo "::error::TypeScript errors found! Check tsc-report.txt"
          grep "error TS" tsc-report.txt || true
          exit 1

      - name: Fail on lint errors
        if: always() && steps.lint.outcome == 'failure'
        run: |
          echo "::error::Lint errors found! Check lint-report.txt"
          exit 1

      - name: Fail on build errors
        if: always() && steps.build-web.outcome == 'failure'
        run: |
          echo "::error::Build errors found! Check build-report.txt"
          exit 1

  # ─── Build APK ──────────────────────────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: risk-app-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
