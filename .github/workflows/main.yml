name: Android APK Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: risk
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: risk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit 2>&1 | tee tsc-report.txt
        continue-on-error: true

      - name: Lint
        run: npm run lint 2>&1 | tee lint-report.txt || true

      - name: Build web app
        run: npm run build 2>&1 | tee build-report.txt

      - name: Fail on TypeScript errors
        run: |
          if grep -q "error TS" tsc-report.txt; then
            echo "::error::TypeScript errors found!"
            grep "error TS" tsc-report.txt
            exit 1
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: risk/tsc-report.txt

  build-apk:
    name: Build APK
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: risk
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: risk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('risk/android/**/*.gradle*', 'risk/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Add Android platform
        run: npx cap add android 2>/dev/null || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: risk-app-apk
          path: risk/android/app/build/outputs/apk/debug/*.apk
